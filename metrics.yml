# Place this file at: .github/workflows/metrics.yml
# (in your kyan0s-git/kyan0s-git profile repository)
#
# Requires a repo secret named METRICS_TOKEN:
#   A GitHub Personal Access Token (classic) with scopes: repo, read:user
#   Settings → Secrets and variables → Actions → New repository secret

name: Metrics

on:
  schedule:
    - cron: "0 0 * * *"   # runs once a day
  workflow_dispatch:       # lets you trigger it manually from the Actions tab
  push:
    branches: ["main", "master"]

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    environment:
      name: production
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: github-metrics.svg

          # --- Theme: dark navy / Tenebrist Mono-ish ---
          config_theme: dark-blue
          config_timezone: America/Los_Angeles

          # --- Sections ---
          base: header, activity, community, repositories, metadata
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_analysis_timeout: 15
          plugin_languages_recent_categories: owner, organization-member
          plugin_languages_details: percentage

          plugin_calendar: yes           # isometric contribution calendar (the "activity graph")
          plugin_calendar_limit: 12

          plugin_habits: yes             # coding habits (active hours, indent style, etc.)
          plugin_habits_charts: yes
          plugin_habits_days: 14
          plugin_habits_facts: yes

          plugin_achievements: yes
          plugin_achievements_display: compact
